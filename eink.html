<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Anomaly Dashboard · v5 Ultra</title>
<style>
:root {
  --bg: #FFFFFF; --fg: #000000; --mid: #444444; --light: #666666;
  --faint: #999999; --border: #AAAAAA; --border-light: #CCCCCC;
  --bar-bg: #DDDDDD; --bar-fill: #333333; --card-bg: #F8F8F8;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #181818; --fg: #E0E0E0; --mid: #AAAAAA; --light: #777777;
    --faint: #444444; --border: #333333; --border-light: #282828;
    --bar-bg: #2A2A2A; --bar-fill: #AAAAAA; --card-bg: #1E1E1E;
  }
}
:root[data-theme="dark"] {
  --bg: #181818; --fg: #E0E0E0; --mid: #AAAAAA; --light: #777777;
  --faint: #444444; --border: #333333; --border-light: #282828;
  --bar-bg: #2A2A2A; --bar-fill: #AAAAAA; --card-bg: #1E1E1E;
}
:root[data-theme="light"] {
  --bg: #FFFFFF; --fg: #000000; --mid: #444444; --light: #666666;
  --faint: #999999; --border: #AAAAAA; --border-light: #CCCCCC;
  --bar-bg: #DDDDDD; --bar-fill: #333333; --card-bg: #F8F8F8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Georgia, 'Noto Serif SC', 'SimSun', serif;
  background: var(--bg); color: var(--fg);
  width: 600px; height: 800px; overflow: hidden;
  padding: 24px 24px 16px; display: flex; flex-direction: column;
}
.sans { font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif; }
.mono { font-family: 'Consolas', 'Courier New', monospace; font-variant-numeric: tabular-nums; }

/* ===== Top: DateTime + Weather ===== */
.top-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  margin-bottom: 20px;
}
.weather-card, .datetime-card {
  background: var(--card-bg); border: 1px solid var(--border-light); padding: 14px 16px;
}

/* DateTime card */
.dt-time { font-size: 40px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
.dt-meta { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.dt-date { font-size: 15px; color: var(--mid); }
.dt-week { font-size: 14px; color: var(--light); }
.dt-battery { font-size: 13px; color: var(--light); margin-top: 6px; display: flex; align-items: center; gap: 4px; }
.dt-battery svg { width: 16px; height: 12px; }

/* Weather card */
.w-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.w-temp { font-size: 40px; font-weight: 700; line-height: 1; }
.w-icon { color: var(--mid); }
.w-icon svg { width: 30px; height: 30px; }
.w-detail { font-size: 13px; color: var(--light); line-height: 1.7; }

/* ===== Quote ===== */
.quote {
  text-align: center; padding: 16px 24px;
  border: 1px solid var(--border-light); position: relative;
  margin-bottom: 20px;
}
.quote::before, .quote::after {
  position: absolute; font-size: 28px; color: var(--faint); font-family: Georgia, serif; line-height: 1;
}
.quote::before { content: '\201C'; top: 6px; left: 12px; }
.quote::after { content: '\201D'; bottom: 2px; right: 12px; }
.quote-text { font-size: 19px; line-height: 1.8; font-style: italic; margin-bottom: 4px; }
.quote-src { font-size: 12px; color: var(--light); letter-spacing: 0.05em; }

/* ===== Quota cards ===== */
.quota-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px;
  flex: 1;
}
.q-card {
  background: var(--card-bg); border: 1px solid var(--border-light);
  padding: 12px 14px; display: flex; flex-direction: column;
}
.q-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.q-head svg { width: 20px; height: 20px; flex-shrink: 0; }
.q-name { font-size: 17px; font-weight: 600; }

/* Single bar row */
.q-row { margin-bottom: 8px; }
.q-row:last-child { margin-bottom: 0; }
.q-label {
  display: flex; justify-content: space-between; margin-bottom: 3px;
  font-size: 11px; color: var(--light); letter-spacing: 0.06em;
}
.q-label .q-pct { color: var(--mid); font-size: 13px; font-weight: 600; }
.q-bar { height: 8px; background: var(--bar-bg); width: 100%; }
.q-bar-fill { height: 100%; background: var(--bar-fill); }
.q-refresh { font-size: 11px; color: var(--faint); margin-top: 2px; letter-spacing: 0.03em; }

/* DeepSeek balance */
.q-balance { font-size: 24px; font-weight: 700; margin: 6px 0 4px; }
.q-balance-unit { font-size: 12px; font-weight: 400; color: var(--light); }
.q-balance-sub { font-size: 11px; color: var(--faint); }

/* ===== Footer ===== */
.footer {
  margin-top: 16px; display: flex; justify-content: space-between; align-items: center;
  padding-top: 8px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--light);
}
.data-alert {
  display: none; margin: -10px 0 12px; padding: 6px 10px;
  border: 2px solid #000; text-align: center;
  font: 700 13px/1.3 Arial, 'Microsoft YaHei', sans-serif;
  color: #000; background: #fff;
}
.data-alert.on { display: block; }
.footer .warn { color: #000; font-weight: 700; }
</style>
</head>
