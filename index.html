<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>偏差链 · 额度中控台</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { min-height:100vh; overflow-x:hidden; position:relative;
    font-family:"PingFang SC","Microsoft YaHei","Source Han Sans SC",sans-serif; }

  /* ================= 皮肤：夜空（默认） ================= */
  body.theme-night {
    --ink:#eef0ff; --ink-dim:#9aa3c7;
    --card:rgba(23,30,64,.72); --card-edge:rgba(255,255,255,.09);
    --bar-bg:rgba(255,255,255,.08);
    --ok:#7fd8a4; --warn:#f2c96d; --alert:#f27d7d;
    color:var(--ink);
    background:linear-gradient(180deg,#0b1026 0%,#141b3d 55%,#1d2650 100%);
  }
  .theme-night .card { background:var(--card); border:1px solid var(--card-edge);
    backdrop-filter:blur(8px);
    box-shadow:0 12px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06); }
  .theme-night .title { text-shadow:0 0 24px rgba(245,238,218,.25); }
  .theme-night .bar { background:var(--bar-bg); }
  .theme-night .deco { display:block; }

  /* ================= 皮肤：纸墨 ================= */
  body.theme-paper {
    --ink:#1a1a1a; --ink-dim:#8a8578;
    --card:#fffdf7; --card-edge:#1a1a1a;
    --bar-bg:#f0ead9;
    --ok:#2e7d4f; --warn:#b8860b; --alert:#b03a2e;
    color:var(--ink); background:#f7f3e8;
    font-family:Georgia,"Songti SC","SimSun",serif;
  }
  .theme-paper .card { background:var(--card); border:2.5px solid var(--card-edge);
    box-shadow:5px 5px 0 rgba(26,26,26,.12); }
  .theme-paper .title { letter-spacing:.3em; }
  .theme-paper .bar { background:var(--bar-bg); border:2px solid var(--card-edge); }
  .theme-paper .deco { display:none; }
  .theme-paper .updated { border:2px solid var(--card-edge); background:transparent; }
  .theme-paper .avatar { border:2px solid var(--card-edge); background:transparent; }

  /* ================= 共用骨架 ================= */
  .deco { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle 3s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:.9} }
  .moon {
    position:absolute; top:6vh; right:7vw;
    width:110px; height:110px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%,#f5eeda 0%,#d8cfae 78%);
    box-shadow:0 0 40px 12px rgba(245,238,218,.28),0 0 120px 50px rgba(245,238,218,.12);
    animation:moonFloat 9s ease-in-out infinite;
  }
  @keyframes moonFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .cloud { position:absolute; background:rgba(255,255,255,.08); border-radius:999px;
    filter:blur(2px); animation:drift linear infinite; }
  .cloud::before,.cloud::after { content:""; position:absolute; background:inherit; border-radius:50%; }
  .cloud.c1 { width:220px; height:56px; top:12vh; animation-duration:80s; }
  .cloud.c1::before { width:80px; height:80px; top:-38px; left:32px; }
  .cloud.c1::after  { width:56px; height:56px; top:-24px; left:110px; }
  .cloud.c2 { width:300px; height:64px; top:30vh; animation-duration:120s; animation-delay:-40s; background:rgba(255,255,255,.14); }
  .cloud.c2::before { width:100px; height:100px; top:-46px; left:48px; }
  .cloud.c2::after  { width:64px; height:64px; top:-28px; left:170px; }
  @keyframes drift { from{left:-340px} to{left:110vw} }

  .wrap { position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:7vh 24px 40px; }
  header { text-align:center; margin-bottom:5vh; }
  .title { font-size:clamp(26px,4vw,40px); letter-spacing:.18em; font-weight:700; }
  .subtitle { margin-top:10px; color:var(--ink-dim); font-size:14px; letter-spacing:.3em; }
  .updated { margin-top:14px; font-size:12.5px; color:var(--ink-dim);
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(128,128,128,.08); border:1px solid var(--card-edge);
    padding:6px 14px; border-radius:999px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 8px var(--ok); }
  .dot.stale { background:var(--warn); box-shadow:0 0 8px var(--warn); }

  .grid { display:grid; gap:22px; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); }
  .card { border-radius:20px; padding:22px 20px 18px; position:relative; overflow:hidden;
    transition:transform .25s ease, box-shadow .25s ease; }
  .card:hover { transform:translateY(-4px); }
  .card-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .avatar { width:38px; height:38px; border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:20px; background:rgba(128,128,128,.1); border:1px solid var(--card-edge); }
  .name { font-size:17px; font-weight:600; letter-spacing:.04em; }
  .role { font-size:11.5px; color:var(--ink-dim); margin-top:2px; }
  .big { font-size:30px; font-weight:700; margin:4px 0 2px; font-variant-numeric:tabular-nums; }
  .big small { font-size:14px; font-weight:400; color:var(--ink-dim); margin-left:4px; }
  .big.s-ok{color:var(--ok)} .big.s-warn{color:var(--warn)} .big.s-alert{color:var(--alert)}
  .big.s-err{color:var(--ink-dim); font-size:18px; }
  .windows { margin-top:14px; display:flex; flex-direction:column; gap:12px; }
  .win-head { display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-dim); margin-bottom:5px; }
  .win-head b { color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums; }
  .bar { height:8px; border-radius:99px; overflow:hidden; }
  .bar i { display:block; height:100%; border-radius:99px; transition:width .8s cubic-bezier(.22,1,.36,1); }
  .bar i.s-ok{background:var(--ok)} .bar i.s-warn{background:var(--warn)} .bar i.s-alert{background:var(--alert)}
  .reset { font-size:11px; color:var(--ink-dim); margin-top:3px; }
  .err-msg { margin-top:12px; font-size:12.5px; color:var(--ink-dim);
    background:rgba(128,128,128,.06); border:1px dashed var(--card-edge);
    border-radius:10px; padding:8px 10px; line-height:1.6; }
  footer { margin-top:6vh; text-align:center; color:var(--ink-dim); font-size:12px; letter-spacing:.2em; }

  /* 换肤按钮 */
  .skin-btn {
    position:fixed; bottom:20px; right:20px; z-index:9;
    border:1px solid var(--card-edge); background:var(--card);
    color:var(--ink); border-radius:999px; padding:9px 16px;
    font-size:13px; cursor:pointer; letter-spacing:.08em;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
    transition:transform .2s ease;
  }
  .skin-btn:hover { transform:scale(1.06); }
  @media (max-width:560px){ .moon{width:74px;height:74px;top:4vh;right:6vw} }
</style>
</head>
<body class="theme-night">
  <div class="deco" id="deco">
    <div class="moon"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
  </div>

  <div class="wrap">
    <header>
      <div class="title" id="title">🌑 偏差链 · 额度中控台</div>
      <div class="subtitle" id="subtitle">云 里 雾 里 的 月 ， 替 你 看 着 四 家 的 粮</div>
      <div class="updated"><span class="dot" id="dot"></span><span id="updatedText">等待首次数据…</span></div>
    </header>
    <main class="grid" id="grid"></main>
    <footer><span>朧月 Oboro · 锚 ⚓ · 为 Avenil 值班</span></footer>
  </div>

  <button class="skin-btn" id="skinBtn" onclick="nextSkin()">🌙 换皮肤</button>

<script>
/* ============ 皮肤系统：加新皮肤 = SKINS 里加一条 + CSS 里加一段 theme-xxx ============ */
var SKINS = [
  { id:"night", name:"夜空", btn:"🌙 夜空" },
  { id:"paper", name:"纸墨", btn:"📜 纸墨" }
];
var skinIdx = 0;
try { skinIdx = Math.max(0, SKINS.findIndex(function(s){ return s.id === localStorage.getItem("dash-skin"); })); } catch(e){}
if (skinIdx < 0) skinIdx = 0;

function applySkin() {
  document.body.className = "theme-" + SKINS[skinIdx].id;
  document.getElementById("skinBtn").textContent = SKINS[(skinIdx+1)%SKINS.length].btn + " ▶";
  try { localStorage.setItem("dash-skin", SKINS[skinIdx].id); } catch(e){}
}
function nextSkin() { skinIdx = (skinIdx+1) % SKINS.length; applySkin(); }

/* ============ 演示数据 ============ */
var DEMO = {
  updatedAt: null,
  sources: {
    deepseek: { ok:true, label:"DeepSeek", balance:12.34, currency:"CNY", fetchedAt:null, error:null },
    claude:   { ok:true, label:"Claude", windows:[{name:"5小时",usedPct:23.5,resetAt:null},{name:"7天",usedPct:41.0,resetAt:null}], fetchedAt:null, error:null },
    codex:    { ok:true, label:"Codex", windows:[{name:"5小时",usedPct:8.8,resetAt:null},{name:"周",usedPct:32.4,resetAt:null}], fetchedAt:null, error:null },
    kimi:     { ok:false, label:"Kimi", windows:[], fetchedAt:null, error:"等待后端接口探路…（演示模式）" }
  }
};

var META = {
  deepseek: { emoji:"🌊", role:"Cinder / 站岗吃瓜" },
  claude:   { emoji:"🕯️", role:"Oshra / 系统管家" },
  codex:    { emoji:"🦞", role:"Codex / 施工队长" },
  kimi:     { emoji:"🌑", role:"朧月 / 就是我" }
};

function levelOf(p){ if(p==null)return "ok"; if(p>=90)return "alert"; if(p>=70)return "warn"; return "ok"; }
function fmtReset(r){ if(!r)return ""; var d=new Date(r);
  return "重置 "+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")
    +" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function fmtTime(iso){ if(!iso)return ""; var d=new Date(iso);
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

function renderCard(key, src) {
  var meta = META[key] || { emoji:"🛰️", role:"" };
  var status="err", bigHtml="", windowsHtml="", errHtml="";
  if (src.ok) {
    if (key==="deepseek" && src.balance!=null) {
      status = src.balance<=5 ? "warn" : "ok";
      bigHtml = '<div class="big s-'+status+'">¥'+Number(src.balance).toFixed(2)+'<small>剩余余额</small></div>';
    } else if (Array.isArray(src.windows) && src.windows.length) {
      var worst = Math.max.apply(null, src.windows.map(function(w){return w.usedPct||0;}));
      status = levelOf(worst);
      bigHtml = '<div class="big s-'+status+'">'+worst.toFixed(1)+'<small>% 最紧窗口</small></div>';
      windowsHtml = '<div class="windows">'+src.windows.map(function(w){
        var lv = levelOf(w.usedPct);
        return '<div class="win"><div class="win-head"><span>'+w.name+'</span><b>'+(w.usedPct||0).toFixed(1)+'%</b></div>'
          +'<div class="bar"><i class="s-'+lv+'" style="width:'+Math.min(100,w.usedPct||0)+'%"></i></div>'
          +'<div class="reset">'+fmtReset(w.resetAt)+'</div></div>';
      }).join("")+'</div>';
    } else { bigHtml = '<div class="big s-ok">在线<small>无窗口数据</small></div>'; }
  } else {
    bigHtml = '<div class="big s-err">信号丢失</div>';
    errHtml = '<div class="err-msg">'+(src.error||"未知原因")+'</div>';
  }
  return '<section class="card">'
    +'<div class="card-head"><div class="avatar">'+meta.emoji+'</div>'
    +'<div><div class="name">'+(src.label||key)+'</div><div class="role">'+meta.role+'</div></div></div>'
    +bigHtml+windowsHtml+errHtml+'</section>';
}

function render(data) {
  var order = ["kimi","claude","codex","deepseek"];
  var keys = order.filter(function(k){return data.sources && data.sources[k];})
    .concat(Object.keys(data.sources||{}).filter(function(k){return order.indexOf(k)<0;}));
  document.getElementById("grid").innerHTML = keys.map(function(k){return renderCard(k,data.sources[k]);}).join("");
  var dot = document.getElementById("dot"), txt = document.getElementById("updatedText");
  if (data.updatedAt) {
    var mins = (Date.now()-new Date(data.updatedAt).getTime())/60000;
    dot.className = "dot"+(mins>30?" stale":"");
    txt.textContent = "数据更新于 "+fmtTime(data.updatedAt)+(mins>30?"（有点旧了）":"");
  } else {
    dot.className = "dot stale";
    txt.textContent = "演示模式 · 等待后端数据";
  }
}

function tick() {
  fetch("data.json?_="+Date.now(), {cache:"no-store"})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(render)
    .catch(function(){ render(DEMO); });
}

(function makeStars(){
  var deco = document.getElementById("deco");
  for (var i=0;i<70;i++) {
    var s = document.createElement("div"); s.className="star";
    var size = Math.random()*2+1;
    s.style.width = s.style.height = size+"px";
    s.style.left = Math.random()*100+"vw";
    s.style.top = Math.random()*100+"vh";
    s.style.animationDelay = (Math.random()*3)+"s";
    s.style.animationDuration = (2+Math.random()*3)+"s";
    deco.appendChild(s);
  }
})();

applySkin();
tick();
setInterval(tick, 60000);
</script>
</body>
</html>
